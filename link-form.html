<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add/Edit Link - Link_in</title>
  <link rel="stylesheet" href="popup.css" />
  <style>
    body { min-width: auto; max-width: 480px; margin: 0 auto; padding: 24px; }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 1.25rem; color: #16213e; }
    .back-link { font-size: 12px; color: #6b7280; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .form-actions .btn { margin-left: 8px; }
    .success-msg { padding: 16px; background: #d1fae5; color: #065f46; border-radius: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="#" class="back-link" id="backLink">← 목록으로</a>
    <h1 id="pageTitle">링크 추가</h1>
  </div>

  <div id="successMsg" class="success-msg" style="display:none;">저장되었습니다. 이 탭을 닫아도 됩니다.</div>

  <form id="linkForm">
    <input type="hidden" id="linkId" />
    <div class="form-group">
      <label for="linkUrl">주소 URL *</label>
      <input type="url" id="linkUrl" required placeholder="https://..." />
    </div>
    <div class="form-group">
      <label for="siteName">사이트 이름 *</label>
      <input type="text" id="siteName" required placeholder="예: 네이버" />
    </div>
    <div class="form-group">
      <label>사이트 로고</label>
      <div class="logo-upload-area" id="logoDropZone">
        <div class="logo-preview" id="logoPreview"></div>
        <p class="logo-drop-hint" id="logoDropHint">이미지를 여기로 끌어다 놓으세요</p>
        <input type="hidden" id="siteImage" />
        <div class="logo-actions">
          <button type="button" class="btn btn-sm btn-danger" id="logoClearBtn">로고 제거</button>
        </div>
        <p class="logo-notice">※ 이미지 파일을 위 영역에 끌어다 놓으세요. (최대 10MB)</p>
      </div>
    </div>
    <div class="form-group">
      <label for="linkDescription">설명</label>
      <textarea id="linkDescription" rows="2" placeholder="한 줄 설명 (선택)"></textarea>
    </div>
    <div class="form-group">
      <label for="linkCategory">카테고리 *</label>
      <select id="linkCategory" required></select>
    </div>
    <div class="form-actions">
      <button type="button" class="btn" id="cancelBtn">취소</button>
      <button type="submit" class="btn btn-primary">저장</button>
    </div>
  </form>

  <script src="link-form.js"></script>
</body>
</html>
